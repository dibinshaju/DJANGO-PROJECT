{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
  <h2>System Login</h2>

  {% if form.errors %}
    <p style="color: white;">Invalid username or password. Please try again.</p>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Login</button>
  </form>
{% endblock %}
